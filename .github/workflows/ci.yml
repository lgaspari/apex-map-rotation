name: 'CI'

on:
  # Triggers workflow on pull request events
  pull_request:
  # Triggers workflow on push events to the `main` branch
  push:
    branches:
      - main
  # Enables this workflow to be triggered manually
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

  build-and-test-pwa:
    name: Build and test (PWA)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application with PWA enabled
        env:
          VITE_PWA_ENABLED: 'true'
        run: pnpm run build

      - name: Verify PWA artifacts
        run: |
          test -f dist/sw.js
          test -f dist/manifest.webmanifest
          grep -q '/apex-map-rotation/manifest.webmanifest' dist/index.html
          grep -q '/apex-map-rotation/favicon.ico' dist/index.html

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run PWA E2E tests
        run: pnpm run test:pwa

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run Lighthouse
        env:
          VITE_APEX_LEGENDS_API_SECRET_TOKEN: ${{ secrets.VITE_APEX_LEGENDS_API_SECRET_TOKEN }}
        run: pnpm lighthouse

      - name: Write Lighthouse summary
        if: always()
        run: node scripts/lighthouse-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports
          path: lhci-reports/
          if-no-files-found: warn
