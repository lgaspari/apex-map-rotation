name: 'Lighthouse (production)'

on:
  workflow_run:
    workflows: ['CD']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.workflow_run.head_sha || github.ref }}'
  cancel-in-progress: true

jobs:
  lighthouse-production:
    name: Lighthouse (production)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Wait for GitHub Pages
        run: |
          for i in $(seq 1 30); do
            curl -sf https://lgaspari.github.io/apex-map-rotation/ && exit 0
            sleep 10
          done
          exit 1

      - name: Run Lighthouse against production
        run: pnpm lighthouse:production

      - name: Write Lighthouse summary
        if: always()
        env:
          LHCI_REPORTS_DIR: lhci-reports-production
        run: node scripts/lighthouse-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-production-reports
          path: lhci-reports-production/
          if-no-files-found: warn
