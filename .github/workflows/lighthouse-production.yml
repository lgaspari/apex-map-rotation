name: 'Lighthouse (production)'

on:
  workflow_run:
    workflows: [pages-build-deployment]
    types: [completed]
    branches: [gh-pages]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.workflow_run.head_commit.message || github.ref }}'
  cancel-in-progress: true

jobs:
  lighthouse-production:
    name: Lighthouse (production)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        startsWith(github.event.workflow_run.head_commit.message, 'v')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || format('refs/tags/{0}', github.event.workflow_run.head_commit.message) }}

      - name: Set production URL
        run: echo "PRODUCTION_URL=$(jq -r .homepage package.json)" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run Lighthouse against production
        run: pnpm lighthouse:production

      - name: Write Lighthouse summary
        if: always()
        env:
          LHCI_REPORTS_DIR: lhci-reports-production
        run: node scripts/lighthouse-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-production-reports
          path: lhci-reports-production/
          if-no-files-found: warn
